services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: insider
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: notifications_db
    ports:
      - "5432:5432"
    # Uygulamaların DB hazır olmadan bağlanıp çökmesini önlemek için Healthcheck şart!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insider -d notifications_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: insider_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Hem konteyner içinden hem dışarıdan (localhost) erişim için çift listener:
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  db-migrate:
    image: migrate/migrate:v4.18.3
    container_name: insider_db_migrate
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://insider:secretpassword@postgres:5432/notifications_db?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kafka-init:
    image: apache/kafka:latest
    container_name: insider_kafka_init
    command:
      - /bin/sh
      - -ec
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka broker..."
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic notifications-high
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic notifications-normal
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic notifications-low
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic notifications-dlq
    depends_on:
      kafka:
        condition: service_started
    restart: "no"

  app-api:
    build: .
    container_name: insider_api
    restart: unless-stopped
    ports: ["8080:8080"]
    env_file: [.env]
    environment:
      # ---> [KRİTİK]: Docker içi adresleri burada eziyoruz <---
      - DATABASE_URL=postgres://insider:secretpassword@postgres:5432/notifications_db
      - REDIS_URL=redis:6379
      - KAFKA_BROKER=kafka:29092
    command: ["/app/api"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  app-relay:
    build: .
    container_name: insider_relay
    restart: unless-stopped
    ports: ["9094:9094"]
    env_file: [.env]
    environment:
      # ---> [KRİTİK]: localhost yerine servis isimlerini yazıyoruz <---
      - DATABASE_URL=postgres://insider:secretpassword@postgres:5432/notifications_db
      - KAFKA_BROKER=kafka:29092
    command: ["/app/relay"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  app-worker:
    build: .
    container_name: insider_worker
    restart: unless-stopped
    ports: ["9091:9091"]
    env_file: [.env]
    environment:
      # ---> [KRİTİK]: localhost yerine servis isimlerini yazıyoruz <---
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=postgres://insider:secretpassword@postgres:5432/notifications_db
      - REDIS_URL=redis:6379
    command: ["/app/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
