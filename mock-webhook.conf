server {
    listen 80;

    # Webhook endpoint - tüm isteklere 202 Accepted döner
    location /webhook {
        default_type application/json;
        return 202 '{"messageId":"mock-msg-001","status":"accepted","timestamp":"2026-01-01T00:00:00Z"}';
    }

    # Health check endpoint (Docker healthcheck için)
    location /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
}
